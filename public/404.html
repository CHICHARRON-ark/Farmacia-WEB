<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Página no encontrada | Farmacia Econopharma</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #e8f5e9 0%, #f4faf5 50%, #f1f8e9 100%);
        color: #1a2e22;
        line-height: 1.6;
      }

      .header {
        padding: 1.25rem 1.5rem;
        background: rgba(255, 255, 255, 0.95);
        border-bottom: 1px solid #c5e1c8;
      }

      .header__logo {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-weight: 700;
        font-size: 1.2rem;
        color: #1a2e22;
        text-decoration: none;
      }

      .header__logo-icon {
        color: #2e9e4d;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }

      .card {
        width: min(100%, 480px);
        background: #ffffff;
        border: 1px solid #c5e1c8;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(26, 46, 34, 0.08);
        padding: 2.5rem 2rem;
        text-align: center;
      }

      .code {
        display: inline-block;
        font-size: 4rem;
        font-weight: 800;
        line-height: 1;
        color: #2e9e4d;
        margin: 0 0 0.5rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 1.75rem;
        color: #5a7060;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.7rem 1.35rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: transform 0.15s, background 0.15s;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn--primary {
        background: #2e9e4d;
        color: #ffffff;
        border: 2px solid #2e9e4d;
      }

      .btn--primary:hover {
        background: #1b6b2e;
        border-color: #1b6b2e;
      }

      .btn--outline {
        background: transparent;
        color: #2e9e4d;
        border: 2px solid #2e9e4d;
      }

      .footer {
        padding: 1rem 1.5rem;
        text-align: center;
        font-size: 0.85rem;
        color: #5a7060;
        border-top: 1px solid #c5e1c8;
        background: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a class="header__logo" href="/#/">
        <span class="header__logo-icon" aria-hidden="true">✦</span>
        Farmacia Econopharma
      </a>
    </header>

    <main>
      <div class="card">
        <p class="code" aria-hidden="true">404</p>
        <h1>Página no encontrada</h1>
        <p>
          Lo sentimos, la página que buscas no existe o fue movida.
          Vuelve al inicio o consulta nuestros servicios.
        </p>
        <div class="actions">
          <a class="btn btn--primary" href="/#/">Volver al inicio</a>
          <a class="btn btn--outline" href="/#/servicios">Ver servicios</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      © Farmacia Econopharma — Todos los derechos reservados
    </footer>
  </body>
</html>
